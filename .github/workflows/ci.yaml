name: ERP Application CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint Code Base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install Linting Tools
        run: pip install flake8
      - name: Run Linting
        run: flake8 app.py test_app.py

  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install Test Dependencies
        run: pip install -r requirements.txt
      - name: Run Unit Tests
        run: pytest --cov=app --cov-report=xml test_app.py --junitxml=test-results.xml
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  sonar:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: test
    environment: prod
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Download Coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=zohaibwarraich1_erp-dummy-app
            -Dsonar.organization=zohaibwarraich1
            -Dsonar.sources=.
            -Dsonar.python.coverage.reportPaths=coverage.xml

  build:
    name: Build Docker Image and Trivy Scan
    runs-on: ubuntu-latest
    needs: test
    environment: prod
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t zohaibwarraich/erp-dummy-app:${{ github.sha }} .
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'zohaibwarraich/erp-dummy-app:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push Docker Image
        run: docker push zohaibwarraich/erp-dummy-app:${{ github.sha }}

  deploy:
    name: Helm validation and GitOps Deployment
    runs-on: ubuntu-latest
    needs: [build, sonar]
    environment: prod
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.12.0
      - name: Clone GitOps Repo for Validation
        uses: actions/checkout@v4
        with:
          repository: 'zohaibwarraich1/erp-gitops-config'
          path: 'gitops-repo'
          token: ${{ secrets.GIT_TOKEN }}
      - name: Run Helm Validation
        run: helm lint gitops-repo/charts/erp-base
      - name: Update Image Tag in GitOps Repo
        run: |
          cd gitops-repo
          yq -i '.image.tag = "${{ github.sha }}"' charts/erp-base/values.yaml
          git config user.name "GitHub Actions CI"
          git config user.email "raveeddogar10@gmail.com"
          git add charts/erp-base/values.yaml
          git commit -m "Update ERP image tag to ${{ github.sha }}"
          git push origin main
