name: ERP Application CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 1. Linting Stage
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Linting Tools
        run: pip install flake8
      - name: Run Linting
        run: flake8 app.py test_app.py

      # 2. Unit Test Stage
      - name: Install Test Dependencies
        run: pip install -r requirements.txt
      - name: Run Unit Tests
        run: pytest test_app.py --junitxml=test-results.xml

      # 3. SonarQube Analysis
      - name: SonarQube Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=digitalsofts-erp
            -Dsonar.organization=digitalsofts
            -Dsonar.sources=.

      # 4. Docker Build
      - name: Build Docker Image
        run: docker build -t digitalsofts/erp-app:${{ github.sha }} .

      # 5. Trivy Scan (Image Scanning)
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'digitalsofts/erp-app:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # 6. Helm Validation
      # Assuming the GitOps repo is cloned or available to validate
      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.12.0
      - name: Clone GitOps Repo for Validation
        uses: actions/checkout@v3
        with:
          repository: 'your-org/erp-gitops-config'
          path: 'gitops-repo'
          token: ${{ secrets.GITOPS_PAT }}
      - name: Run Helm Validation
        run: helm lint gitops-repo/charts/erp-base

      # 7. Deployment Automation (GitOps Update)
      - name: Update Image Tag in GitOps Repo
        run: |
          cd gitops-repo
          # Safely update ONLY the app image tag (using yq) so it doesn't break the database image tag
          yq -i '.image.tag = "${{ github.sha }}"' charts/erp-base/values.yaml
          git config user.name "GitHub Actions CI"
          git config user.email "ci@digitalsofts.com"
          git add charts/erp-base/values.yaml
          git commit -m "Update ERP image tag to ${{ github.sha }}"
          git push origin main
